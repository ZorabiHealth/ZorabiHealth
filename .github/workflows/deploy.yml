name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  vercel:
    name: Deploy Web to Vercel
    needs: [validate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zorabihealth
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          working-directory: ./zorabihealth

  supabase:
    name: Deploy Supabase Migrations & Functions
    needs: [validate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zorabihealth
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy Edge Functions
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "Deploying edge function: $name"
            supabase functions deploy "$name"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  healthcheck:
    name: Post-Deploy Health Check
    needs: [vercel, supabase]
    runs-on: ubuntu-latest
    steps:
      - name: Check web app health
        run: |
          url="https://${{ vars.VERCEL_DOMAIN || 'zorabi-health.vercel.app' }}/api/health"
          for i in $(seq 1 5); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Health check passed (HTTP $status)"
              exit 0
            fi
            echo "Attempt $i: HTTP $status — retrying in 10s"
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
